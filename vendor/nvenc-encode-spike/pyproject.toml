# Self-contained, hostable wheel for the encode-only NVENC spike.
# Build with ./build-wheel.sh (runs scikit-build-core + auditwheel repair), then
# upload dist/*.whl to a GitHub release. See README.md and
# docs/nvenc_sdk_evaluation.md.
[build-system]
requires = ["scikit-build-core>=0.10"]
build-backend = "scikit_build_core.build"

[project]
name = "pdum-rfb-nvenc-sdk"
version = "0.0.1"
description = "Encode-only NVENC spike (NVIDIA Video Codec SDK encoder, GPU NV12 -> H.264/HEVC Annex B, no PyAV)"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.10"
authors = [{ name = "Nehal Patel" }]
classifiers = [
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Environment :: GPU :: NVIDIA CUDA",
]

[project.urls]
Repository = "https://github.com/habemus-papadum/pdum_rfb"

[tool.scikit-build]
minimum-version = "0.10"
cmake.build-type = "Release"
wheel.packages = ["nvenc_spike"]
# pybind11 + (optional) NVTX are fetched by CMake's FetchContent, so they are not
# build-system requires. NVTX off by default; turn on for a profiling wheel with
#   ./build-wheel.sh --nvtx     (sets -Dtool.scikit-build below via env)
cmake.version = ">=3.21"

[tool.scikit-build.cmake.define]
USE_NVTX = "OFF"

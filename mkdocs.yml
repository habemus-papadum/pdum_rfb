site_name: habemus-papadum-rfb
site_description: Remote Frame Buffer
site_author: Nehal Patel
repo_url: https://github.com/habemus-papadum/pdum_rfb
repo_name: pdum_rfb

theme:
  name: "material"
  palette:
    primary: blue grey


nav:
  - Overview: index.md
  - Installation: installation.md
  - Python Guide: guide_python.md
  - JavaScript Guide: guide_javascript.md
  - Internals: internals.md
  - Demo harness (pdum-rfb demo): demo.md
  - Features:
      - Still after settle: still_after_settle.md
      - Multiple streams: multiple_streams.md
      - ASGI / Starlette adapter: asgi.md
      - Metrics & adaptive quality: metrics_adaptive.md
      - Pipelined encode: pipelined_encode.md
  - Repository & Development: development.md
  - Performance: performance.md
  - GPU / hardware encode:
      - Zero-copy CUDA→NVENC (PyAV): gpu_zerocopy.md
      - NVENC SDK evaluation: nvenc_sdk_evaluation.md
      - VideoToolbox encoder (macOS): mlx_metal_videotoolbox_encoder_design.md
      - Pipelined encode — NVENC impl guide: pipelined_encode_nvenc_impl.md
  - Integrations:
      - rendercanvas backend (feasibility): rendercanvas_backend.md
      - Zero-copy wgpu→NVENC package: wgpu_nvenc_zerocopy.md
  - Roadmap: roadmap.md
  - API: reference.md
  - Design Notes:
      - Architecture overview: remote_framebuffer.md
      - Implementation Guide: remote_framebuffer_implementation_guide.md
      - Addendum: remote_framebuffer_addendum.md
      - Encoder sync & seq attribution: encoder_sync_and_seq_attribution.md
      - Sizing, DPR & color: sizing_dpr_color.md
  - Concepts:
      - Modern video encoding — a guide: video_encoding_guide.md

# If you'd like to specify a separate docs directory, you can do so here
docs_dir: docs

# Markdown extensions — LaTeX (arithmatex + MathJax) and mermaid/admonitions for
# the concept guides (docs/video_encoding_guide.md, docs/sizing_dpr_color.md).
markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

# MathJax (rendered by pymdownx.arithmatex generic mode)
extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

# Plugins to enable
plugins:
  - search
  - mkdocs-jupyter
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          options:
            docstring_style: numpy
            show_submodules: true

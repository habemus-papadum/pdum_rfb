name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  actions: read
  repository-projects: read

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
      actions: read
      repository-projects: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Project Setup
        run: ./scripts/setup.sh

      - name: Run Linting
        run: uv run ruff check .

      - name: Run Tests with Coverage
        run: uv run pytest --cov=src/pdum/rfb --cov-report=xml --cov-report=term
      - name: Build Documentation
        run: uv run mkdocs build
      - name: Temporarily disable git hooks for coverage action
        run: |
          if [ -f .git/hooks/pre-commit ]; then
            mv .git/hooks/pre-commit .git/hooks/pre-commit.disabled
          fi

      - name: Coverage Comment
        id: coverage_comment
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ github.token }}
          MINIMUM_GREEN: 80
          MINIMUM_ORANGE: 70

      - name: Re-enable git hooks
        if: always()
        run: |
          if [ -f .git/hooks/pre-commit.disabled ]; then
            mv .git/hooks/pre-commit.disabled .git/hooks/pre-commit
          fi

      - name: Store Pull Request comment to be posted
        uses: actions/upload-artifact@v4
        if: steps.coverage_comment.outputs.COMMENT_FILE_WRITTEN == 'true'
        with:
          name: python-coverage-comment-action
          path: python-coverage-comment-action.txt

  widgets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python deps (for the e2e test server)
        run: uv sync --frozen

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: widgets/pnpm-lock.yaml

      - name: Install widget dependencies
        run: pnpm -C widgets install --frozen-lockfile

      - name: Typecheck
        run: pnpm -C widgets typecheck

      - name: Unit tests
        run: pnpm -C widgets test

      - name: Install Playwright browser
        run: pnpm -C widgets exec playwright install --with-deps chromium

      - name: End-to-end tests
        run: pnpm -C widgets e2e

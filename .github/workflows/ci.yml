name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}   # allow manually re-running the experimental macOS probe on demand

permissions:
  contents: write
  pull-requests: write
  actions: read
  repository-projects: read

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
      actions: read
      repository-projects: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Project Setup
        run: ./scripts/setup.sh

      - name: Run Linting
        run: uv run ruff check .

      - name: Install Mesa lavapipe (software Vulkan for the rendercanvas render test)
        run: sudo apt-get update && sudo apt-get install -y mesa-vulkan-drivers libvulkan1

      - name: Run Tests with Coverage
        run: uv run pytest --cov=src/pdum/rfb --cov-report=xml --cov-report=term
      - name: Build Documentation
        run: uv run mkdocs build
      - name: Run demo notebooks (headless, no file modification)
        # Executes every .ipynb listed in mkdocs.yml (currently docs/demos/anywidget.ipynb)
        # via nbconvert. The committed anywidget bundle is checked out, so no Node step is
        # needed here — this proves the notebook API + widget mimebundle work end to end.
        run: ./scripts/test_notebooks.sh --no-inplace
      - name: Temporarily disable git hooks for coverage action
        run: |
          if [ -f .git/hooks/pre-commit ]; then
            mv .git/hooks/pre-commit .git/hooks/pre-commit.disabled
          fi

      - name: Coverage Comment
        id: coverage_comment
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ github.token }}
          MINIMUM_GREEN: 80
          MINIMUM_ORANGE: 70

      - name: Re-enable git hooks
        if: always()
        run: |
          if [ -f .git/hooks/pre-commit.disabled ]; then
            mv .git/hooks/pre-commit.disabled .git/hooks/pre-commit
          fi

      - name: Store Pull Request comment to be posted
        uses: actions/upload-artifact@v4
        if: steps.coverage_comment.outputs.COMMENT_FILE_WRITTEN == 'true'
        with:
          name: python-coverage-comment-action
          path: python-coverage-comment-action.txt

  widgets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python deps (for the e2e test server)
        # The e2e server doesn't render with wgpu/pygfx, so skip the heavy `viz` group.
        run: uv sync --frozen --no-group viz

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: widgets/pnpm-lock.yaml

      - name: Install widget dependencies
        run: pnpm -C widgets install --frozen-lockfile

      - name: Build core package (framework wrappers typecheck/build against its dist)
        run: pnpm -C widgets build

      - name: Typecheck
        run: pnpm -C widgets typecheck

      - name: Unit tests
        run: pnpm -C widgets test

      - name: Framework wrappers — typecheck, test, build
        run: |
          pnpm -C widgets -r --filter './packages/*' run typecheck
          pnpm -C widgets -r --filter './packages/*' run test
          pnpm -C widgets -r --filter './packages/*' run build

      - name: Anywidget bundle is up to date (committed artifact matches source)
        # The wheel ships the prebuilt src/pdum/rfb/static/widget.{js,css}; rebuild from
        # widgets/anywidget/ and fail if the tracked files drift from source.
        run: |
          pnpm -C widgets run build:anywidget
          git diff --exit-code -- src/pdum/rfb/static/widget.js src/pdum/rfb/static/widget.css \
            || { echo "::error::src/pdum/rfb/static/widget.{js,css} is stale — run 'pnpm -C widgets run build:anywidget' and commit the result."; exit 1; }

      - name: Install Playwright browser
        run: pnpm -C widgets exec playwright install --with-deps chromium

      - name: End-to-end tests
        run: pnpm -C widgets e2e

  macos:
    name: macOS (experimental — Metal / VideoToolbox probe)
    runs-on: macos-latest   # Apple Silicon (arm64); MLX needs arm64 + macOS >= 14
    # EXPERIMENT — standard GitHub-hosted macOS runners are virtualized and historically do NOT
    # expose a working Metal GPU (actions/runner-images#7085). This job reports what actually
    # runs vs. skips here: the Metal (MLX) tests gate on a real GPU device, and MLX has a history
    # of hard-aborting on headless boxes (ml-explore/mlx#3148), so we isolate the probe. Kept
    # non-blocking (continue-on-error) until we've seen the outcome — flip it off to make it gate.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install macOS video deps (VideoToolbox encoder + MLX)
        # mac-vt builds the native pdum.vtenc (clang / Xcode CLT, present on the runner);
        # mac-dev adds MLX (Apple Metal). Deliberately NOT ./scripts/setup.sh — no pnpm /
        # Playwright / pre-commit; this is a focused capability probe.
        run: uv sync --frozen --extra mac-vt --group mac-dev

      - name: Probe Metal (MLX) + VideoToolbox
        # MLX runs in a SUBPROCESS so a native abort() (the #3148 failure mode) surfaces as a
        # non-zero exit code we can report — not a silent step kill. This step never fails.
        shell: bash
        run: |
          echo "## host"; uname -sm; sw_vers || true; echo
          echo "## MLX / Metal (subprocess; non-zero rc == native crash, the flagged risk)"
          set +e
          uv run python - <<'PY'
          import sys
          print("python  :", sys.version.split()[0])
          print("platform:", sys.platform)
          try:
              import mlx.core as mx
              dev = mx.default_device()
              print("mlx import :", "OK")
              print("default_dev:", dev, "| reports gpu:", "gpu" in str(dev).lower())
              a = mx.ones((512, 512)); b = a @ a; mx.eval(b)   # force a real Metal kernel
              print("matmul eval: OK  sum=%.0f" % float(b.sum()))
          except Exception as e:
              print("mlx raised (catchable -> tests skip cleanly):", type(e).__name__, e)
          PY
          echo "mlx probe exit code: $?  (0 = clean, non-zero = native crash/abort)"
          echo
          echo "## VideoToolbox"
          uv run python - <<'PY'
          try:
              from pdum.vtenc import supported
              print("pdum.vtenc import: OK | supported() =", supported())
          except Exception as e:
              print("pdum.vtenc raised:", type(e).__name__, e)
          PY
          set -e

      - name: VideoToolbox tests (tests/test_vtenc.py)
        # Exception-safe gate (a real one-frame VT encode) -> cleanly skips if VT can't open.
        continue-on-error: true
        run: uv run pytest tests/test_vtenc.py -ra

      - name: Metal / MLX tests (tests/test_metal.py)
        # Gates on a real Metal GPU device; expected to skip on a GPU-less runner. Last + isolated
        # so it can't hide the VideoToolbox result even if MLX aborts.
        continue-on-error: true
        run: uv run pytest tests/test_metal.py -ra

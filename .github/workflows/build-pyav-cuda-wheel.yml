# Build the self-contained PyAV 18 (CUDA/NVENC) wheel (scripts/build-cuda-av-wheel.sh).
#
# This is the wheel that enables the zero-copy CUDA->NVENC path (gpu_zerocopy.md)
# before PyAV 18.0 ships on PyPI. Like the SDK-wheel workflow, it is NOT run on
# pushes to main — only on demand or on a release tag:
#   * "Run workflow" (workflow_dispatch), or
#   * a tag matching `gpu-av18-*` (also publishes a release).
#
# No GPU and no CUDA toolkit are needed to build: it links a prebuilt BtbN LGPL
# ffmpeg (which carries h264_nvenc); the GPU is only needed at runtime.
name: build-pyav-cuda-wheel

on:
  workflow_dispatch:
    inputs:
      python_versions:
        description: "Space-separated CPython versions to build"
        default: "3.12 3.13 3.14"
  push:
    tags: ["gpu-av18-*"]

permissions:
  contents: write   # create releases on tag

jobs:
  build:
    runs-on: ubuntu-latest
    # manylinux_2_28 base -> broadly-compatible wheels (RHEL8 / Ubuntu 18.10+).
    container: quay.io/pypa/manylinux_2_28_x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Build CUDA PyAV wheel(s)
        run: |
          PV="${{ github.event.inputs.python_versions || '3.12 3.13 3.14' }}"
          PYTHON_VERSIONS="$PV" OUT=dist/cuda-wheels ./scripts/build-cuda-av-wheel.sh

      - name: Upload wheels (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: pyav-cuda-wheels
          path: dist/cuda-wheels/*.whl

      - name: Publish to release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/cuda-wheels/*.whl
          body: |
            PyAV 18 (CUDA/NVENC) wheels. Self-contained: bundle a CUDA-capable LGPL
            ffmpeg (h264_nvenc), need only the host NVIDIA driver at runtime.
            Redistribution carries LGPL obligations. See docs/gpu_zerocopy.md.

# Build the NVENC SDK wheel (packages/nvenc -> habemus-papadum-nvenc) as a CI
# artifact, to validate that it builds across CPython versions.
#
# Build only — it does NOT publish. Publishing to PyPI is done from a maintainer box
# by scripts/publish.sh (see that script). Deliberately NOT triggered on pushes to
# main; it's an expensive, rarely-needed build.
#
# No GPU is needed to BUILD (we link the CUDA driver stub; libnvidia-encode is
# dlopen'd at runtime). The wheel can't be self-tested here (no GPU on GitHub
# runners) — validate on a GPU box with `pdum-rfb doctor`, or via the weekly
# gpu-tests workflow.
name: build-nvenc-sdk-wheel

on:
  workflow_dispatch:
    inputs:
      python_versions:
        description: "Space-separated CPython versions to build"
        default: "3.12 3.13 3.14"
      use_nvtx:
        description: "Build a profiling wheel (NVTX ranges on)"
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    # manylinux_2_28 + CUDA toolkit (NVIDIA's own base) -> broadly-compatible wheels
    # (manylinux_2_28 installs on RHEL8 / Ubuntu 18.10+), unlike a stock-Ubuntu build.
    # The 13.0 NVENC ABI builds fine here: its headers are vendored, not from the toolkit.
    container: sameli/manylinux_2_28_x86_64_cuda_12.3
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Build wheel(s)
        working-directory: packages/nvenc
        run: |
          PV="${{ github.event.inputs.python_versions || '3.12 3.13 3.14' }}"
          ARGS=""
          [ "${{ github.event.inputs.use_nvtx }}" = "true" ] && ARGS="--nvtx"
          PYTHON_VERSIONS="$PV" ./build-wheel.sh $ARGS

      - name: Upload wheels (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: nvenc-sdk-wheels
          path: packages/nvenc/dist/*.whl

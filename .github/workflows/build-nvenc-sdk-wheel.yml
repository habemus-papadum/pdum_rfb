# Build the encode-only NVENC SDK spike wheel (vendor/nvenc-encode-spike).
#
# Deliberately NOT triggered on pushes to main — it's an expensive, rarely-needed
# build. It runs only when:
#   * you click "Run workflow" (workflow_dispatch), or
#   * you push a tag matching `nvenc-sdk-*` (which also publishes a release).
#
# No GPU is needed to BUILD (we link the CUDA driver stub; libnvidia-encode is
# dlopen'd at runtime). The wheel cannot be self-tested here — there's no GPU on
# GitHub runners — so validate it on a GPU box (`pdum-rfb doctor`).
name: build-nvenc-sdk-wheel

on:
  workflow_dispatch:
    inputs:
      python_versions:
        description: "Space-separated CPython versions to build"
        default: "3.12 3.13 3.14"
      use_nvtx:
        description: "Build a profiling wheel (NVTX ranges on)"
        type: boolean
        default: false
  push:
    tags: ["nvenc-sdk-*"]

permissions:
  contents: write   # create releases on tag

jobs:
  build:
    runs-on: ubuntu-latest
    # manylinux_2_28 + CUDA toolkit (NVIDIA's own base) -> broadly-compatible wheels
    # (manylinux_2_28 installs on RHEL8 / Ubuntu 18.10+), unlike a stock-Ubuntu build.
    container: sameli/manylinux_2_28_x86_64_cuda_12.3
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Build wheel(s)
        working-directory: vendor/nvenc-encode-spike
        run: |
          PV="${{ github.event.inputs.python_versions || '3.12 3.13 3.14' }}"
          ARGS=""
          [ "${{ github.event.inputs.use_nvtx }}" = "true" ] && ARGS="--nvtx"
          PYTHON_VERSIONS="$PV" ./build-wheel.sh $ARGS

      - name: Upload wheels (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: nvenc-sdk-wheels
          path: vendor/nvenc-encode-spike/dist/*.whl

      - name: Publish to release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: vendor/nvenc-encode-spike/dist/*.whl
          body: |
            Encode-only NVENC SDK spike wheels (`nvenc_spike`). Self-contained except
            for the host NVIDIA driver (`libcuda` / `libnvidia-encode` are not bundled).
            MIT (incl. bundled NVIDIA SDK, MIT). See docs/nvenc_sdk_evaluation.md.
